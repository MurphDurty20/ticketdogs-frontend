<!DOCTYPE html>
<html lang="en">
<head>
<meta name="impact-site-verification" content="a55d085d-44e8-4c4d-b901-830c8e60523b">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketDogs - Compare ticket prices before you buy</title>
<meta name="description" content="TicketDogs searches Ticketmaster and other ticket sources at once, so you can compare prices for concerts, sports, and shows in one place before you buy.">
<link rel="canonical" href="https://www.ticketdogs.com/">

<!-- Open Graph / social share preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="TicketDogs - Compare ticket prices before you buy">
<meta property="og:description" content="Search once, compare prices across ticket sources, and find your event for less.">
<meta property="og:url" content="https://www.ticketdogs.com/">
<meta property="og:image" content="https://www.ticketdogs.com/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter/X card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TicketDogs - Compare ticket prices before you buy">
<meta name="twitter:description" content="Search once, compare prices across ticket sources, and find your event for less.">
<meta name="twitter:image" content="https://www.ticketdogs.com/assets/og-image.png">

<link rel="icon" type="image/png" href="assets/logo-badge-transparent.png">

<style>
  :root {
    --ink: #0f2031;
    --header-bg: #1e3a54;
    --paper: #f6f3ec;
    --amber: #dca95e;
    --amber-deep: #b98c48;
    --line: #d8d2c2;
    --muted: #6b6558;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  .perf {
    height: 10px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size: 20px 10px;
    background-color: var(--ink);
    background-position: center;
  }

  header {
    background: var(--paper);
    padding: 52px 24px 30px;
    text-align: center;
  }

  .brand-logo {
    height: clamp(64px, 10vw, 84px);
    width: auto;
    display: block;
    margin: 0 auto;
  }

  .tagline {
    margin: 16px 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    font-style: italic;
  }

  main {
    max-width: 980px;
    margin: 10px auto 80px;
    padding: 0 20px;
  }

  .search-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 12px 30px -12px rgba(20, 23, 31, 0.35);
    padding: 22px;
    display: flex;
    gap: 10px;
  }

  #keyword {
    flex: 1;
    border: 2px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }

  #keyword:focus { border-color: var(--amber-deep); }

  button#searchBtn {
    background: var(--amber-deep);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 0 26px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button#searchBtn:hover { background: #a86813; }
  button#searchBtn:disabled { background: var(--muted); cursor: default; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 16px 2px 0;
  }

  .suggestions .label {
    color: var(--muted);
    font-size: 0.85rem;
    align-self: center;
    margin-right: 2px;
  }

  .chip {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .chip:hover {
    border-color: var(--amber-deep);
    color: var(--amber-deep);
  }

  .status {
    text-align: center;
    color: var(--muted);
    margin: 34px 0;
    font-size: 0.98rem;
  }

  .status.error { color: #a3402f; }

  #results {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .result-count {
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 2px 4px;
  }

  .event-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 8px -4px rgba(20,23,31,0.15);
    position: relative;
  }

  .event-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 28px -14px rgba(20,23,31,0.32);
  }

  .event-thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    background-color: var(--line);
    background-size: cover;
    background-position: center;
    position: relative;
    flex-shrink: 0;
  }

  .source-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(15, 32, 49, 0.82);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
  }

  .event-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 14px 4px;
    min-width: 0;
  }

  .event-name {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .event-meta {
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.4;
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .event-price {
    text-align: left;
    font-weight: 700;
    color: var(--amber-deep);
    font-size: 1.02rem;
    padding: 10px 14px 14px;
    margin-top: auto;
    border-top: 1px solid var(--line);
  }

  .price-cta {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--muted);
    font-style: italic;
  }

  .event-card:hover .price-cta {
    color: var(--amber-deep);
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 30px 20px 50px;
  }

  /* --- Auth bar + favorites --- */
  #authBar {
    text-align: center;
    padding: 10px 20px 20px;
    font-size: 0.9rem;
  }

  #loginBtn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 16px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
  }

  #authLoggedIn a { color: var(--amber-deep); }

  #logoutBtn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }

  #loginModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 32, 49, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  #loginModal .modal-box {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    max-width: 360px;
    width: 90%;
  }

  #loginEmail {
    width: 100%;
    padding: 10px;
    border: 2px solid var(--line);
    border-radius: 8px;
    font-family: inherit;
    margin-bottom: 12px;
    box-sizing: border-box;
  }

  #loginStatus {
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 20px;
  }

  #sendLoginBtn {
    flex: 1;
    background: var(--amber-deep);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }

  #closeLoginBtn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
  }

  .fav-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 2;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 1.2rem;
    cursor: pointer;
  }

  @media (max-width: 720px) {
    #results { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 480px) {
    .search-card { flex-direction: column; }
    #keyword { font-size: 16px; } /* prevents iOS auto-zoom on focus */
    button#searchBtn { width: 100%; min-height: 48px; }
    #results { grid-template-columns: 1fr; }
    header { padding: 36px 20px 26px; }
    .brand-logo { height: 56px; }
  }

  #citySelect {
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 3px 6px;
  background: var(--card);
  color: var(--ink);
  }

  .follow-btn {
  background: none;
  border: 1px solid var(--amber-deep);
  color: var(--amber-deep);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}

.follow-btn.following {
  background: var(--amber-deep);
  color: var(--paper);
}
}

</style>
</head>
<body>

<header>
  <a href="/" style="display:inline-block;">
    <img class="brand-logo" src="assets/TicketDogs_Logo2_transparent.png" alt="TicketDogs">
  </a>
  <p class="tagline">We fetch. You compare.</p>
</header>
<div class="perf"></div>

<div id="authBar">
  <span id="authLoggedOut">
    <button id="loginBtn">Sign in to save favorites</button>
  </span>
  <span id="authLoggedIn" style="display:none;">
    Signed in as <span id="userEmail"></span> ·
    <a href="/account.html">My Account</a> ·
    City: <select id="citySelect"><option value="">Choose your city</option></select> ·
    <button id="logoutBtn">Sign out</button>
  </span>
</div>

<div id="loginModal">
  <div class="modal-box">
    <h3 style="margin-top:0;">Sign in</h3>
    <p style="color:var(--muted); font-size:0.9rem;">We'll email you a one-time login link. No password needed.</p>
    <input type="email" id="loginEmail" placeholder="you@example.com">
    <div id="loginStatus"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button id="sendLoginBtn">Send login link</button>
      <button id="closeLoginBtn">Cancel</button>
    </div>
  </div>
</div>

<main>
  <div class="search-card">
    <input type="text" id="keyword" placeholder="Search an artist, team, or show…" autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <div id="suggestions" class="suggestions"></div>

  <div id="status" class="status"></div>
  <div id="results"></div>
</main>

<footer>
  Prices and availability pulled live from ticketing partners. TicketDogs may earn a commission on some links.
</footer>

<script>
  const API_URL = "https://ticketdogs-api.azurewebsites.net/api/searchevents";
  const AUTH_API = "https://ticketdogs-api.azurewebsites.net/api";

  const input = document.getElementById('keyword');
  const suggestionsEl = document.getElementById('suggestions');

  // A small curated list of reliably popular searches, used both as
  // clickable suggestion chips and to auto-populate the homepage on load
  // so first-time visitors see real results instead of a blank search box.
  const POPULAR_SEARCHES = [
    "Taylor Swift",
    "Morgan Wallen",
    "Coldplay",
    "NFL",
    "Bad Bunny",
    "Ed Sheeran"
  ];
  const button = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  async function runSearch() {
    const keyword = input.value.trim();
    if (!keyword) {
      status.textContent = "Type something to search for — an artist, a team, a show.";
      status.className = "status error";
      results.innerHTML = "";
      return;
    }

    button.disabled = true;
    button.textContent = "Searching…";
    status.className = "status";
    status.textContent = "Fetching live prices…";
    results.innerHTML = "";

    try {
      const data = await fetchEvents(keyword);

      if (!data.events || data.events.length === 0) {
        status.textContent = "";

        const emptyMsg = document.createElement('p');
        emptyMsg.className = 'status';
        emptyMsg.textContent = `No upcoming events found for "${keyword}" right now.`;

        const followBtn = document.createElement('button');
        followBtn.className = 'follow-btn';
        followBtn.style.display = 'block';
        followBtn.style.margin = '10px auto 0';
        followBtn.textContent = 'Follow ' + keyword;
        followBtn.addEventListener('click', () => toggleFollowArtist(keyword, followBtn));
        updateFollowButtonState(followBtn, keyword);

        results.appendChild(emptyMsg);
        results.appendChild(followBtn);
        return;
}
      }

      status.textContent = "";

        const headerRow = document.createElement('div');
        headerRow.style.cssText = 'grid-column: 1 / -1; display:flex; justify-content:space-between; align-items:center; margin: 0 2px 4px;';

        const countLine = document.createElement('p');
        countLine.className = 'result-count';
        countLine.style.margin = '0';
        countLine.textContent = `${data.count} result${data.count === 1 ? '' : 's'} for "${data.keyword}"`;

        const followBtn = document.createElement('button');
        followBtn.className = 'follow-btn';
        followBtn.textContent = 'Follow ' + keyword;
        followBtn.addEventListener('click', () => toggleFollowArtist(keyword, followBtn));
        updateFollowButtonState(followBtn, keyword);

        headerRow.appendChild(countLine);
        headerRow.appendChild(followBtn);
        results.appendChild(headerRow);

        data.events.forEach(ev => results.appendChild(buildEventCard(ev)));

    } catch (err) {
      status.className = "status error";
      status.textContent = err.message || "Something went wrong reaching the ticket search. Please try again in a moment.";
      console.error(err);
    } finally {
      button.disabled = false;
      button.textContent = "Search";
    }
  }

  async function fetchEvents(keyword) {
    const res = await fetch(`${API_URL}?keyword=${encodeURIComponent(keyword)}`);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || `Server responded with ${res.status}`);
    }
    return data;
  }

  function buildEventCard(ev) {
    const card = document.createElement('div');
    card.className = 'event-card';

    const link = document.createElement('a');
    link.href = ev.url || '#';
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.style.textDecoration = 'none';
    link.style.color = 'inherit';
    link.style.display = 'flex';
    link.style.flexDirection = 'column';
    link.style.flex = '1';

    const thumbStyle = ev.image
      ? `background-image: url('${escapeHtml(ev.image)}');`
      : '';

    const eventId = getFavoriteId(ev.url || '');
    const isFav = isFavorited(eventId);

    link.innerHTML = `
      <div class="event-thumb" style="${thumbStyle}">
        <span class="source-tag">${escapeHtml(ev.source || 'Source')}</span>
      </div>
      <div class="event-content">
        <p class="event-name">${escapeHtml(ev.name)}</p>
        <div class="event-meta">
          ${escapeHtml(ev.date)}<br>${escapeHtml(ev.venue)}${ev.city ? ', ' + escapeHtml(ev.city) : ''}
        </div>
      </div>
      <div class="event-price">${formatPrice(ev.price, ev.source)}</div>
    `;

    const favBtn = document.createElement('button');
    favBtn.className = 'fav-btn';
    favBtn.textContent = isFav ? '★' : '☆';
    favBtn.title = isFav ? 'Remove from favorites' : 'Save to favorites';
    favBtn.style.color = isFav ? '#dca95e' : '#999';
    favBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await toggleFavorite(ev, eventId, favBtn);
    });

    card.appendChild(link);
    card.appendChild(favBtn);
    return card;
  }

  function formatPrice(price, source) {
    if (!price || price === 'Price not listed') {
      const label = source ? `See on ${escapeHtml(source)}` : 'See price';
      return `<span class="price-cta">${label} →</span>`;
    }
    return escapeHtml(price);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  button.addEventListener('click', runSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

  function renderSuggestions() {
    suggestionsEl.innerHTML = '<span class="label">Try:</span>';
    POPULAR_SEARCHES.forEach(term => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = term;
      chip.addEventListener('click', () => {
        input.value = term;
        runSearch();
      });
      suggestionsEl.appendChild(chip);
    });
  }

  function loadDefaultSearch() {
  if (getSessionToken() && currentUserCity) {
    loadCityShows(currentUserCity);
  } else {
    loadTrending();
  }
}

async function loadCityShows(city) {
  status.className = "status";
  status.textContent = `Fetching shows in ${city}…`;
  results.innerHTML = "";

  try {
    const res = await fetch(`${AUTH_API}/searcheventsbycity?city=${encodeURIComponent(city)}`);
    const data = await res.json();

    status.textContent = "";

    const cityHeading = document.createElement('p');
    cityHeading.className = 'result-count';
    cityHeading.textContent = `Upcoming shows in ${city}`;
    results.appendChild(cityHeading);

    if (data.events && data.events.length > 0) {
      const realOnly = data.events.filter(ev => !looksLikeTribute(ev.name));
      realOnly.forEach(ev => results.appendChild(buildEventCard(ev)));
    } else {
      const noneMsg = document.createElement('p');
      noneMsg.className = 'status';
      noneMsg.textContent = `No upcoming shows found in ${city} right now.`;
      results.appendChild(noneMsg);
    }

    // Append general trending below the city-specific results
    const picks = shuffle([...POPULAR_SEARCHES]).slice(0, 4);
    const settled = await Promise.allSettled(picks.map(term => fetchEvents(term)));

    let combined = [];
    settled.forEach(result => {
      if (result.status === 'fulfilled' && result.value.events) {
        const realOnly = result.value.events.filter(ev => !looksLikeTribute(ev.name));
        combined = combined.concat(realOnly.slice(0, 2));
      }
    });

    if (combined.length > 0) {
      combined = shuffle(combined);
      const trendingHeading = document.createElement('p');
      trendingHeading.className = 'result-count';
      trendingHeading.style.marginTop = '20px';
      trendingHeading.textContent = 'Trending right now';
      results.appendChild(trendingHeading);
      combined.forEach(ev => results.appendChild(buildEventCard(ev)));
    }

  } catch (err) {
    status.className = "status error";
    status.textContent = "Couldn't load shows for your city right now. Try a search above.";
    console.error(err);
  }
}

  function looksLikeTribute(name) {
    if (!name) return false;
    const flags = [
      'tribute', 'a salute to', 'the music of', 'cover band',
      'ultimate ', 'experience -', ' experience:', 'reimagined'
    ];
    const lower = name.toLowerCase();
    return flags.some(flag => lower.includes(flag));
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function loadTrending() {
  status.className = "status";
  status.textContent = "Fetching trending shows…";
  results.innerHTML = "";

  const picks = shuffle([...POPULAR_SEARCHES]).slice(0, 4);

  const settled = await Promise.allSettled(
    picks.map(term => fetchEvents(term))
  );

  let combined = [];
  settled.forEach(result => {
    if (result.status === 'fulfilled' && result.value.events) {
      const realOnly = result.value.events.filter(ev => !looksLikeTribute(ev.name));
      combined = combined.concat(realOnly.slice(0, 2));
    }
  });

  if (combined.length === 0) {
    status.textContent = "Couldn't load trending shows right now. Try a search above.";
    return;
  }

  combined = shuffle(combined);

  status.textContent = "";
  const heading = document.createElement('p');
  heading.className = 'result-count';
  heading.textContent = 'Trending right now';
  results.appendChild(heading);

  combined.forEach(ev => results.appendChild(buildEventCard(ev)));
}

  // --- Auth / favorites ---
  let localFavoriteIds = new Set(JSON.parse(localStorage.getItem('favIds') || '[]'));

  function getSessionToken() {
    return localStorage.getItem('sessionToken');
  }

  function getUserEmail() {
    return localStorage.getItem('userEmail');
  }

  function isFavorited(eventId) {
    return localFavoriteIds.has(eventId);
  }

  // Simple stable ID generator for local "is this favorited" checks.
  // Doesn't need to match the backend's uuid5 hash — just needs to be
  // consistent locally so we can toggle star state without an extra fetch.
  function getFavoriteId(url) {
    let hash = 0;
    for (let i = 0; i < url.length; i++) {
      hash = (hash << 5) - hash + url.charCodeAt(i);
      hash |= 0;
    }
    return 'id' + hash;
  }

  async function toggleFavorite(ev, eventId, btnEl) {
    const token = getSessionToken();
    if (!token) {
      openLoginModal();
      return;
    }

    const wasFav = localFavoriteIds.has(eventId);

    try {
      if (wasFav) {
        await fetch(`${AUTH_API}/removefavorite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
          body: JSON.stringify({ id: eventId })
        });
        localFavoriteIds.delete(eventId);
        btnEl.textContent = '☆';
        btnEl.style.color = '#999';
      } else {
        await fetch(`${AUTH_API}/addfavorite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
          body: JSON.stringify(ev)
        });
        localFavoriteIds.add(eventId);
        btnEl.textContent = '★';
        btnEl.style.color = '#dca95e';
      }
      localStorage.setItem('favIds', JSON.stringify([...localFavoriteIds]));
    } catch (err) {
      console.error('Failed to update favorite', err);
    }
  }

  let followedArtistNames = new Set();

async function loadFollowedArtists() {
  const token = getSessionToken();
  if (!token) return;

  try {
    const res = await fetch(`${AUTH_API}/getfollowedartists`, {
      headers: { 'X-Session-Token': token }
    });
    const data = await res.json();
    if (res.ok && data.artists) {
      followedArtistNames = new Set(data.artists.map(a => a.toLowerCase()));
    }
  } catch (err) {
    console.error('Failed to load followed artists', err);
  }
}

function updateFollowButtonState(btnEl, artistName) {
  const isFollowing = followedArtistNames.has(artistName.toLowerCase());
  btnEl.textContent = isFollowing ? '✓ Following' : 'Follow ' + artistName;
  btnEl.classList.toggle('following', isFollowing);
}
  

async function toggleFollowArtist(artistName, btnEl) {
  const token = getSessionToken();
  if (!token) {
    openLoginModal();
    return;
  }

  const isFollowing = followedArtistNames.has(artistName.toLowerCase());

  try {
    if (isFollowing) {
      await fetch(`${AUTH_API}/unfollowartist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify({ artist: artistName })
      });
      followedArtistNames.delete(artistName.toLowerCase());
    } else {
      await fetch(`${AUTH_API}/followartist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify({ artist: artistName })
      });
      followedArtistNames.add(artistName.toLowerCase());
    }
    updateFollowButtonState(btnEl, artistName);
  } catch (err) {
    console.error('Failed to update follow status', err);
  }
}

  function updateAuthUI() {
    const email = getUserEmail();
    const loggedOut = document.getElementById('authLoggedOut');
    const loggedIn = document.getElementById('authLoggedIn');
    if (email) {
      loggedOut.style.display = 'none';
      loggedIn.style.display = 'inline';
      document.getElementById('userEmail').textContent = email;
    } else {
      loggedOut.style.display = 'inline';
      loggedIn.style.display = 'none';
    }
  }

  function openLoginModal() {
    document.getElementById('loginModal').style.display = 'flex';
  }

  function closeLoginModal() {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('loginStatus').textContent = '';
    document.getElementById('loginEmail').value = '';
  }

  const citySelect = document.getElementById('citySelect');
let currentUserCity = null;

async function loadCityOptions() {
  try {
    const res = await fetch(`${AUTH_API}/getcities`);
    const data = await res.json();
    data.cities.forEach(city => {
      const opt = document.createElement('option');
      opt.value = city;
      opt.textContent = city;
      citySelect.appendChild(opt);
    });
  } catch (err) {
    console.error('Failed to load city list', err);
  }
}

async function loadUserProfile() {
  const token = getSessionToken();
  if (!token) return;

  try {
    const res = await fetch(`${AUTH_API}/getprofile`, {
      headers: { 'X-Session-Token': token }
    });
    const data = await res.json();
    if (res.ok && data.homeCity) {
      currentUserCity = data.homeCity;
      citySelect.value = data.homeCity;
    }
  } catch (err) {
    console.error('Failed to load profile', err);
  }
}

citySelect.addEventListener('change', async () => {
  const city = citySelect.value;
  const token = getSessionToken();
  if (!city || !token) return;

  try {
    await fetch(`${AUTH_API}/setcity`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
      body: JSON.stringify({ city })
    });
    currentUserCity = city;
    loadDefaultSearch(); // reload homepage feed with new city
  } catch (err) {
    console.error('Failed to save city', err);
  }
});

  document.getElementById('loginBtn').addEventListener('click', openLoginModal);
  document.getElementById('closeLoginBtn').addEventListener('click', closeLoginModal);

  document.getElementById('sendLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const statusEl = document.getElementById('loginStatus');

    if (!email || !email.includes('@')) {
      statusEl.textContent = 'Please enter a valid email address.';
      return;
    }

    statusEl.textContent = 'Sending...';

    try {
      const res = await fetch(`${AUTH_API}/requestlogin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      statusEl.textContent = 'Check your email for a login link!';
    } catch (err) {
      statusEl.textContent = err.message;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('sessionToken');
    localStorage.removeItem('userEmail');
    currentUserCity = null;
    citySelect.value = '';
    updateAuthUI();
    loadDefaultSearch();
});

async function init() {
  updateAuthUI();
  renderSuggestions();
  await loadCityOptions();
  await loadUserProfile();
  await loadFollowedArtists();
  loadDefaultSearch();
}

init();
</script>

</body>
</html>
