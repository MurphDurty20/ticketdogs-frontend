<style>
  :root {
    --ink: #0f2031;
    --header-bg: #1e3a54;
    --paper: #f6f3ec;
    --amber: #dca95e;
    --amber-deep: #b98c48;
    --line: #d8d2c2;
    --muted: #6b6558;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .perf {
    height: 10px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size: 20px 10px;
    background-color: var(--ink);
    background-position: center;
  }

  header {
    background: var(--paper);
    padding: 52px 24px 30px;
    text-align: center;
  }

  .brand-logo {
    height: clamp(64px, 10vw, 84px);
    width: auto;
    display: block;
    margin: 0 auto;
  }

  .tagline {
    margin: 16px 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    font-style: italic;
  }

  main {
    max-width: 880px;
    margin: -28px auto 80px;
    padding: 0 20px;
  }

  .search-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 12px 30px -12px rgba(20, 23, 31, 0.35);
    padding: 22px;
    display: flex;
    gap: 10px;
  }

  #keyword {
    flex: 1;
    border: 2px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }

  #keyword:focus { border-color: var(--amber-deep); }

  button#searchBtn {
    background: var(--amber-deep);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 0 26px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button#searchBtn:hover { background: #a86813; }
  button#searchBtn:disabled { background: var(--muted); cursor: default; }

  .status {
    text-align: center;
    color: var(--muted);
    margin: 34px 0;
    font-size: 0.98rem;
  }

  .status.error { color: #a3402f; }

  #results {
    margin-top: 30px;
    display: grid;
    gap: 14px;
  }

  .result-count {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 2px 4px;
  }

  .event-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 20px;
    align-items: center;
    text-decoration: none;
    color: inherit;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  .event-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--amber);
  }

  .event-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px -12px rgba(20,23,31,0.28);
  }

  .event-name {
    font-weight: 700;
    font-size: 1.08rem;
    margin: 0;
    grid-column: 1;
  }

  .event-meta {
    grid-column: 1;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .event-price {
    grid-column: 2;
    grid-row: 1 / span 2;
    text-align: right;
    font-weight: 700;
    color: var(--amber-deep);
    font-size: 1.1rem;
    white-space: nowrap;
  }

  .source-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 30px 20px 50px;
  }

  @media (max-width: 480px) {
    .search-card { flex-direction: column; }
    .event-card { grid-template-columns: 1fr; }
    .event-price { grid-column: 1; grid-row: auto; text-align: left; margin-top: 6px; }
  }
</style>
</head>

  <p class="tagline">We fetch. You compare.</p>
</header>
<div class="perf"></div>

<main>
  <div class="search-card">
    <input type="text" id="keyword" placeholder="Search an artist, team, or show…" autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <div id="status" class="status"></div>
  <div id="results"></div>
</main>

<footer>
  Prices and availability pulled live from ticketing partners. TicketDogs may earn a commission on some links.
</footer>

<script>
  const API_URL = "https://ticketdogs-api.azurewebsites.net/api/searchevents";

  const input = document.getElementById('keyword');
  const button = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  async function runSearch() {
    const keyword = input.value.trim();
    if (!keyword) {
      status.textContent = "Type something to search for — an artist, a team, a show.";
      status.className = "status error";
      results.innerHTML = "";
      return;
    }

    button.disabled = true;
    button.textContent = "Searching…";
    status.className = "status";
    status.textContent = "Fetching live prices…";
    results.innerHTML = "";

    try {
      const res = await fetch(`${API_URL}?keyword=${encodeURIComponent(keyword)}`);
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      const data = await res.json();

      if (!data.events || data.events.length === 0) {
        status.textContent = `No events found for "${keyword}". Try a different search.`;
        return;
      }

      status.textContent = "";
      const countLine = document.createElement('p');
      countLine.className = 'result-count';
      countLine.textContent = `${data.count} result${data.count === 1 ? '' : 's'} for "${data.keyword}"`;
      results.appendChild(countLine);

      data.events.forEach(ev => {
        const card = document.createElement('a');
        card.className = 'event-card';
        card.href = ev.url || '#';
        card.target = '_blank';
        card.rel = 'noopener noreferrer';

        card.innerHTML = `
          <p class="event-name">${escapeHtml(ev.name)}</p>
          <div class="event-meta">
            ${escapeHtml(ev.date)} · ${escapeHtml(ev.venue)}${ev.city ? ', ' + escapeHtml(ev.city) : ''}
            <span class="source-tag">${escapeHtml(ev.source || 'Source')}</span>
          </div>
          <div class="event-price">${escapeHtml(ev.price)}</div>
        `;
        results.appendChild(card);
      });

    } catch (err) {
      status.className = "status error";
      status.textContent = "Something went wrong reaching the ticket search. Please try again in a moment.";
      console.error(err);
    } finally {
      button.disabled = false;
      button.textContent = "Search";
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  button.addEventListener('click', runSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
</script>

</body>
</html>
