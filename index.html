<style>
  :root {
    --ink: #0f2031;
    --header-bg: #1e3a54;
    --paper: #f6f3ec;
    --amber: #dca95e;
    --amber-deep: #b98c48;
    --line: #d8d2c2;
    --muted: #6b6558;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  .perf {
    height: 10px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size: 20px 10px;
    background-color: var(--ink);
    background-position: center;
  }

  header {
    background: var(--paper);
    padding: 52px 24px 30px;
    text-align: center;
  }

  .brand-logo {
    height: clamp(64px, 10vw, 84px);
    width: auto;
    display: block;
    margin: 0 auto;
  }

  .tagline {
    margin: 16px 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    font-style: italic;
  }

  main {
    max-width: 980px;
    margin: 10px auto 80px;
    padding: 0 20px;
  }

  .search-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 12px 30px -12px rgba(20, 23, 31, 0.35);
    padding: 22px;
    display: flex;
    gap: 10px;
  }

  #keyword {
    flex: 1;
    border: 2px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }

  #keyword:focus { border-color: var(--amber-deep); }

  button#searchBtn {
    background: var(--amber-deep);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 0 26px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button#searchBtn:hover { background: #a86813; }
  button#searchBtn:disabled { background: var(--muted); cursor: default; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 16px 2px 0;
  }

  .suggestions .label {
    color: var(--muted);
    font-size: 0.85rem;
    align-self: center;
    margin-right: 2px;
  }

  .chip {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .chip:hover {
    border-color: var(--amber-deep);
    color: var(--amber-deep);
  }

  .status {
    text-align: center;
    color: var(--muted);
    margin: 34px 0;
    font-size: 0.98rem;
  }

  .status.error { color: #a3402f; }

  #results {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .result-count {
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 2px 4px;
  }

  .event-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 8px -4px rgba(20,23,31,0.15);
    position: relative;
  }

  .event-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 28px -14px rgba(20,23,31,0.32);
  }

  .event-thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    background-color: var(--line);
    background-size: cover;
    background-position: center;
    position: relative;
    flex-shrink: 0;
  }

  .source-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(15, 32, 49, 0.82);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
  }

  .event-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 14px 4px;
    min-width: 0;
  }

  .event-name {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .event-meta {
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.4;
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .event-price {
    text-align: left;
    font-weight: 700;
    color: var(--amber-deep);
    font-size: 1.02rem;
    padding: 10px 14px 14px;
    margin-top: auto;
    border-top: 1px solid var(--line);
  }

  .price-cta {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--muted);
    font-style: italic;
  }

  .event-card:hover .price-cta {
    color: var(--amber-deep);
  }

  .suggest-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 0.95rem;
}

.suggest-item:hover {
  background: var(--paper);
}

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 30px 20px 50px;
  }

  /* --- Auth bar + favorites --- */
  #authBar {
    position: fixed;
    top: 14px;
    right: 20px;
    text-align: right;
    font-size: 0.85rem;
    z-index: 200;
    background: var(--paper);
    padding: 4px 8px;
    border-radius: 8px;
  }

  #loginBtn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.85rem;
  }

  #authLoggedIn a { color: var(--amber-deep); }

  #logoutBtn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }

  #loginModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 32, 49, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  #loginModal .modal-box {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    max-width: 360px;
    width: 90%;
  }

  #loginEmail {
    width: 100%;
    padding: 10px;
    border: 2px solid var(--line);
    border-radius: 8px;
    font-family: inherit;
    margin-bottom: 12px;
    box-sizing: border-box;
  }

  #loginStatus {
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 20px;
  }

  #sendLoginBtn {
    flex: 1;
    background: var(--amber-deep);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }

  #closeLoginBtn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
  }

  .fav-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 2;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 1.2rem;
    cursor: pointer;
  }

  #resultsList {
  grid-column: 1 / -1;
}

#loadMoreBtn {
  grid-column: 1 / -1;
}

  @media (max-width: 720px) {
    #results { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 480px) {
    .search-card { flex-direction: column; }
    #keyword { font-size: 16px; } /* prevents iOS auto-zoom on focus */
    button#searchBtn { width: 100%; min-height: 48px; }
    #results { grid-template-columns: 1fr; }
    header { padding: 36px 20px 26px; }
    .brand-logo { height: 56px; }
    #authBar { font-size: 0.75rem; top: 8px; right: 10px; }
    #authLoggedIn #userEmail { display: none; }
  }

    .follow-btn {
  background: none;
  border: 1px solid var(--amber-deep);
  color: var(--amber-deep);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}

.follow-btn.following {
  background: var(--amber-deep);
  color: var(--paper);
}
.row-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.row-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 12px;
  text-decoration: none;
  color: inherit;
  position: relative;
}

.row-thumb {
  width: 64px;
  height: 64px;
  flex-shrink: 0;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  background-color: var(--line);
}

.row-details {
  flex: 1;
  min-width: 0;
}

.row-name {
  font-weight: 600;
  margin: 0 0 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-meta {
  color: var(--muted);
  font-size: 0.82rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-price {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: 6px;
}

.row-fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2rem;
  flex-shrink: 0;
  padding: 4px;
}

#loadMoreBtn {
  display: block;
  margin: 20px auto 0;
  background: none;
  border: 1px solid var(--amber-deep);
  color: var(--amber-deep);
  border-radius: 999px;
  padding: 10px 24px;
  font-size: 0.9rem;
  font-family: inherit;
  cursor: pointer;
}

@media (max-width: 480px) {
  .row-meta { display: none; }
  .row-thumb { width: 52px; height: 52px; }
}

</style>

<body>

<header>
  <a href="/" style="display:inline-block;">
    <img class="brand-logo" src="assets/TicketDogs_Logo2_transparent.png" alt="TicketDogs">

<div class="perf"></div>

<div id="authBar">

<main>
  <div class="search-card" style="position:relative;">
  <div style="flex:1; position:relative;">
    <input type="text" id="keyword" placeholder="Search an artist, team, or show…" autocomplete="off" style="width:100%; box-sizing:border-box; border:2px solid var(--line); border-radius:8px; padding:14px 90px 14px 16px; font-size:1rem; outline:none; font-family:inherit;">
    <button id="dateIconBtn" type="button" title="Choose dates" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.15rem; line-height:1; color:var(--muted); padding:4px;">📅</button>
    <div id="suggestDropdown" style="display:none; position:absolute; top:100%; left:0; right:0; background:var(--card); border:1px solid var(--line); border-radius:8px; margin-top:4px; box-shadow:0 8px 20px -8px rgba(20,23,31,0.3); z-index:10; overflow:hidden;"></div>
    <div id="datePopover" style="display:none; position:absolute; top:100%; right:0; margin-top:6px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 14px; box-shadow:0 8px 20px -8px rgba(20,23,31,0.3); z-index:20; white-space:nowrap;">
      <div style="display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--muted);">
        <label for="dateFrom">Dates:</label>
        <input type="date" id="dateFrom" style="font-family:inherit; font-size:0.85rem; border:1px solid var(--line); border-radius:6px; padding:4px 6px; background:var(--paper); color:var(--ink);">
        <span>to</span>
        <input type="date" id="dateTo" style="font-family:inherit; font-size:0.85rem; border:1px solid var(--line); border-radius:6px; padding:4px 6px; background:var(--paper); color:var(--ink);">
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button id="clearDatesBtn" type="button" style="display:none; background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.8rem; text-decoration:underline; font-family:inherit;">Clear</button>
      </div>
    </div>
  </div>
  <button id="searchBtn">Search</button>
</div>

<div id="categoryRow" style="display:none; align-items:center; justify-content:center; flex-wrap:wrap; gap:8px; margin-top:10px;"></div>

<div id="hideTributeRow" style="display:none; align-items:center; justify-content:center; gap:6px; margin-top:8px; font-size:0.85rem; color:var(--muted);">
  <label style="cursor:pointer; user-select:none;">
    <input type="checkbox" id="hideTributeCheckbox" style="cursor:pointer; vertical-align:middle; margin-right:4px;">
    Hide tribute/cover acts
  </label>
</div>

<div style="text-align:center; margin-top:8px;">
  <button id="useLocationBtn" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; text-decoration:underline; font-family:inherit;">📍 Use my location</button>
</div>

  <div id="status" class="status"></div>
  <div id="results"></div>
</main>

<footer>
  Prices and availability pulled live from ticketing partners. TicketDogs may earn a commission on some links.
</footer>

<script>
  const API_URL = "https://ticketdogs-api.azurewebsites.net/api/searchevents";
  const AUTH_API = "https://ticketdogs-api.azurewebsites.net/api";

  const input = document.getElementById('keyword');

  // A small curated list of reliably popular searches, used both as
  // clickable suggestion chips and to auto-populate the homepage on load
  // so first-time visitors see real results instead of a blank search box.
  const POPULAR_SEARCHES = [
    "Taylor Swift",
    "Morgan Wallen",
    "Coldplay",
    "NFL",
    "Bad Bunny",
    "Ed Sheeran"
  ];
  const MAJOR_CITIES = [
  "New York", "Los Angeles", "Chicago", "Houston", "Phoenix",
  "Philadelphia", "San Antonio", "San Diego", "Dallas", "Austin",
  "Jacksonville", "Fort Worth", "San Jose", "Columbus", "Charlotte",
  "Indianapolis", "San Francisco", "Seattle", "Denver", "Nashville",
  "Oklahoma City", "El Paso", "Boston", "Portland", "Las Vegas",
  "Detroit", "Memphis", "Louisville", "Milwaukee", "Baltimore",
  "Albuquerque", "Tucson", "Fresno", "Sacramento", "Kansas City",
  "Atlanta", "Miami", "Raleigh", "Omaha", "Minneapolis",
  "Cleveland", "Tampa", "St. Louis", "Pittsburgh", "Cincinnati",
  "Orlando", "New Orleans", "Salt Lake City"
];

  const button = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const dateIconBtn = document.getElementById('dateIconBtn');
  const datePopover = document.getElementById('datePopover');
  const dateFromInput = document.getElementById('dateFrom');
  const dateToInput = document.getElementById('dateTo');
  const clearDatesBtn = document.getElementById('clearDatesBtn');
  const categoryRow = document.getElementById('categoryRow');
  const hideTributeRow = document.getElementById('hideTributeRow');
  const hideTributeCheckbox = document.getElementById('hideTributeCheckbox');

  // Ticketmaster's top-level "segment" classifications. "All" is our own
  // addition to mean "no filter".
  const CATEGORIES = ["All", "Music", "Sports", "Arts & Theatre", "Family", "Film"];
  let currentCategory = "All";
  let userDefaultCategory = "All";

  function renderCategoryChips() {
    categoryRow.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = cat;
      chip.dataset.category = cat;
      if (cat === currentCategory) {
        chip.style.background = 'var(--amber-deep)';
        chip.style.color = 'var(--paper)';
        chip.style.borderColor = 'var(--amber-deep)';
      }
      chip.addEventListener('click', async () => {
        if (cat === currentCategory) return;
        currentCategory = cat;
        renderCategoryChips();

        if (!currentSearchTerm) return;

        resultsDisplayCount = 25;
        status.className = "status";
        status.textContent = "Updating results…";

        try {
          const data = await fetchEvents(currentSearchTerm, dateFromInput.value || null, dateToInput.value || null, cat, 0);
          currentResults = data.events || [];
          resultsCurrentPage = data.page || 0;
          resultsTotalPages = data.totalPages || 1;
          status.textContent = "";
        } catch (err) {
          console.error('Failed to refetch for category change', err);
          status.className = "status error";
          status.textContent = "Something went wrong updating the category filter.";
        }

        renderResultsList();
      });
      categoryRow.appendChild(chip);
    });
  }

  renderCategoryChips();

  // The calendar icon is always available so dates can be picked before
  // typing a search term. Category chips and the tribute toggle only make
  // sense once there's a query to filter, so those still wait for input.
  function updateDateRangeVisibility() {
    const hasQuery = input.value.trim().length > 0;
    categoryRow.style.display = hasQuery ? 'flex' : 'none';
    hideTributeRow.style.display = hasQuery ? 'flex' : 'none';
  }

  input.addEventListener('input', updateDateRangeVisibility);

  hideTributeCheckbox.addEventListener('change', () => {
    resultsDisplayCount = 25;
    renderResultsList();
  });

  dateIconBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    datePopover.style.display = datePopover.style.display === 'none' ? 'block' : 'none';
  });

  // Close the popover on an outside click, but not on clicks inside it.
  document.addEventListener('click', (e) => {
    if (datePopover.style.display !== 'none' && !datePopover.contains(e.target) && e.target !== dateIconBtn) {
      datePopover.style.display = 'none';
    }
  });

  datePopover.addEventListener('click', (e) => e.stopPropagation());

  clearDatesBtn.addEventListener('click', () => {
    dateFromInput.value = '';
    dateToInput.value = '';
    dateToInput.removeAttribute('min');
    updateClearDatesVisibility();
  });

  function updateClearDatesVisibility() {
    const hasDates = dateFromInput.value || dateToInput.value;
    clearDatesBtn.style.display = hasDates ? 'inline' : 'none';
    dateIconBtn.style.color = hasDates ? 'var(--amber-deep)' : 'var(--muted)';
  }

  dateFromInput.addEventListener('change', () => {
    updateClearDatesVisibility();
    // Carry the start date forward as a starting point for the end date,
    // so picking Sept 15 as "from" has "to" already sitting on Sept 15
    // rather than making the person hunt back through the calendar.
    if (dateFromInput.value) {
      dateToInput.min = dateFromInput.value;
      if (!dateToInput.value || dateToInput.value < dateFromInput.value) {
        dateToInput.value = dateFromInput.value;
      }
    } else {
      dateToInput.removeAttribute('min');
    }
  });
  dateToInput.addEventListener('change', updateClearDatesVisibility);

  async function runSearch() {
    datePopover.style.display = 'none';
    const keyword = input.value.trim();
    if (!keyword) {
      status.textContent = "Type something to search for — an artist, a team, a show.";
      status.className = "status error";
      results.innerHTML = "";
      return;
    }

    const startDate = dateFromInput.value || null;
    const endDate = dateToInput.value || null;

    if (startDate && endDate && endDate < startDate) {
      status.textContent = "Your end date is before your start date. Please fix the date range.";
      status.className = "status error";
      return;
    }

    button.disabled = true;
    button.textContent = "Searching…";
    status.className = "status";
    status.textContent = "Fetching live prices…";
    results.innerHTML = "";

    try {
      let data;
      let resolvedFrom = null;

      // Partial city names (e.g. "cin") should behave the same as clicking
      // the matching autocomplete suggestion would — resolve to the full
      // city BEFORE running a literal search. Waiting to see if the literal
      // search comes back empty doesn't work here, since a short fragment
      // can coincidentally match an unrelated event/venue name (e.g. "cin"
      // matching "Cin City Burlesque"), which means it's never truly empty.
      const lowerKeyword = keyword.toLowerCase();
      const cityMatch = MAJOR_CITIES.find(c => c.toLowerCase().startsWith(lowerKeyword));

      if (cityMatch && cityMatch.toLowerCase() !== lowerKeyword) {
        data = await fetchEvents(cityMatch, startDate, endDate);
        if (data.events && data.events.length > 0) {
          resolvedFrom = cityMatch;
        } else {
          // The city guess didn't pan out — fall back to the literal search.
          data = await fetchEvents(keyword, startDate, endDate);
        }
      } else {
        data = await fetchEvents(keyword, startDate, endDate);
      }

      // If a literal search comes up empty, it might be a partial or
      // slightly-off artist name (e.g. "Olivia Rodri"). Ticketmaster's own
      // suggest endpoint already does fuzzy artist/attraction matching for
      // the autocomplete dropdown, so reuse it here as a "did you mean"
      // fallback instead of trying to guess at fuzzy matching ourselves.
      if ((!data.events || data.events.length === 0) && keyword.length >= 2) {
        try {
          const suggestRes = await fetch(`${AUTH_API}/suggestartists?keyword=${encodeURIComponent(keyword)}`);
          const suggestData = await suggestRes.json();
          rememberAttractionIds(suggestData.attractions);
          const topSuggestion = (suggestData.suggestions || [])[0];

          if (topSuggestion && topSuggestion.toLowerCase() !== keyword.toLowerCase()) {
            const retryData = await fetchEvents(topSuggestion, startDate, endDate);
            if (retryData.events && retryData.events.length > 0) {
              data = retryData;
              resolvedFrom = topSuggestion;
            }
          }
        } catch (suggestErr) {
          console.error('Suggestion fallback failed', suggestErr);
        }
      }

      if (!data.events || data.events.length === 0) {
        status.textContent = "";

        const emptyMsg = document.createElement('p');
        emptyMsg.className = 'status';
        emptyMsg.style.gridColumn = '1 / -1';
        emptyMsg.textContent = `No upcoming events found for "${keyword}" right now.`;

        const followBtn = document.createElement('button');
        followBtn.className = 'follow-btn';
        followBtn.style.display = 'block';
        followBtn.style.margin = '10px auto 0';
        followBtn.style.gridColumn = '1 / -1';
        followBtn.textContent = 'Follow ' + keyword;
        followBtn.addEventListener('click', () => toggleFollowArtist(keyword, followBtn));
        updateFollowButtonState(followBtn, keyword);

        results.appendChild(emptyMsg);
        results.appendChild(followBtn);
        return;
      }

      // The term is resolved and confirmed to have events. NOW apply the
      // category filter server-side (if one is active), so the actual
      // first page of results Ticketmaster sends back is already filtered
      // rather than us filtering a generic pull client-side afterward.
      // This is deliberately a separate step from resolution above — mixing
      // category into the resolution fetches would make a real city look
      // like "not found" just because it has zero events in that category.
      const resolvedTerm = resolvedFrom || data.keyword || keyword;
      if (userDefaultCategory !== 'All') {
        try {
          data = await fetchEvents(resolvedTerm, startDate, endDate, userDefaultCategory, 0);
        } catch (categoryErr) {
          console.error('Category-filtered fetch failed, showing unfiltered results', categoryErr);
        }
      }

      status.textContent = "";

        if (resolvedFrom) {
          const correctionNote = document.createElement('p');
          correctionNote.className = 'status';
          correctionNote.style.cssText = 'grid-column: 1 / -1; font-size: 0.85rem; font-style: italic; color: var(--muted); margin: 0 2px 6px;';
          correctionNote.textContent = `Showing results for "${resolvedFrom}"`;
          results.appendChild(correctionNote);
        }

        const headerRow = document.createElement('div');
        headerRow.style.cssText = 'grid-column: 1 / -1; display:flex; justify-content:space-between; align-items:center; margin: 0 2px 4px;';

        const countLine = document.createElement('p');
        countLine.className = 'result-count';
        countLine.style.margin = '0';
        countLine.textContent = `${data.count} result${data.count === 1 ? '' : 's'} for "${resolvedTerm}"`;

        if (data.isCitySearch) {
          const cityTag = document.createElement('span');
          cityTag.textContent = ' 📍 City search';
          cityTag.style.cssText = 'font-size:0.75rem; font-style:italic; color:var(--amber-deep); margin-left:6px;';
          countLine.appendChild(cityTag);
        }

        const followBtn = document.createElement('button');
        followBtn.className = 'follow-btn';
        followBtn.textContent = 'Follow ' + resolvedTerm;
        followBtn.addEventListener('click', () => toggleFollowArtist(resolvedTerm, followBtn));
        updateFollowButtonState(followBtn, resolvedTerm);

        headerRow.appendChild(countLine);
        headerRow.appendChild(followBtn);
        results.appendChild(headerRow);

        currentResults = data.events || [];
        resultsDisplayCount = 25;
        currentCategory = userDefaultCategory;
        renderCategoryChips();
        currentSearchTerm = resolvedTerm;
        currentSearchIsCity = !!data.isCitySearch;
        resultsCurrentPage = data.page || 0;
        resultsTotalPages = data.totalPages || 1;

        const listEl = document.createElement('div');
        listEl.id = 'resultsList';
        listEl.className = 'row-list';
        results.appendChild(listEl);

        renderResultsList();

    } catch (err) {
      status.className = "status error";
      status.textContent = err.message || "Something went wrong reaching the ticket search. Please try again in a moment.";
      console.error(err);
    } finally {
      button.disabled = false;
      button.textContent = "Search";
    }
  }

async function fetchSuggestions(query) {
  const lowerQuery = query.toLowerCase();
  const matchingCities = MAJOR_CITIES.filter(c => c.toLowerCase().startsWith(lowerQuery));

  try {
    const res = await fetch(`${AUTH_API}/suggestartists?keyword=${encodeURIComponent(query)}`);
    const data = await res.json();
    rememberAttractionIds(data.attractions);

    const artistSuggestions = data.suggestions || [];

    // Prioritize matching cities at the top of the list, then artist/event
    // suggestions below. Avoid duplicating a city name that also happens
    // to appear in the artist suggestions.
    const combined = [
      ...matchingCities,
      ...artistSuggestions.filter(name => !matchingCities.some(c => c.toLowerCase() === name.toLowerCase()))
    ];

    if (combined.length === 0) {
      suggestDropdown.style.display = 'none';
      return;
    }

    suggestDropdown.innerHTML = '';
    combined.forEach(name => {
  const item = document.createElement('div');

  const isCity = MAJOR_CITIES.some(c => c.toLowerCase() === name.toLowerCase());

  suggestDropdown.appendChild(item);
});

    suggestDropdown.style.display = 'block';
  } catch (err) {
    console.error('Failed to load suggestions', err);
    suggestDropdown.style.display = 'none';
  }
}

  async function fetchEvents(keyword, startDate, endDate, category, page) {
    let url = `${API_URL}?keyword=${encodeURIComponent(keyword)}`;
    if (startDate) url += `&startDate=${encodeURIComponent(startDate)}`;
    if (endDate) url += `&endDate=${encodeURIComponent(endDate)}`;
    if (category && category !== 'All') url += `&category=${encodeURIComponent(category)}`;
    if (page) url += `&page=${page}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || `Server responded with ${res.status}`);
    }
    return data;
  }

  function buildEventCard(ev) {
    const card = document.createElement('div');
    card.className = 'event-card';

    const link = document.createElement('a');
    link.href = ev.url || '#';
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.style.textDecoration = 'none';
    link.style.color = 'inherit';
    link.style.display = 'flex';
    link.style.flexDirection = 'column';
    link.style.flex = '1';

    const thumbStyle = ev.image
      ? `background-image: url('${escapeHtml(ev.image)}');`
      : '';

    const eventId = getFavoriteId(ev.url || '');
    const isFav = isFavorited(eventId);

    link.innerHTML = `
      <div class="event-thumb" style="${thumbStyle}">
        <span class="source-tag">${escapeHtml(ev.source || 'Source')}</span>
      </div>
      <div class="event-content">
        <p class="event-name">${escapeHtml(ev.name)}</p>
        <div class="event-meta">
          ${escapeHtml(ev.date)}<br>${escapeHtml(ev.venue)}${ev.city ? ', ' + escapeHtml(ev.city) : ''}
        </div>
      </div>
      <div class="event-price">${formatPrice(ev.price, ev.source)}</div>
    `;

    const favBtn = document.createElement('button');
    favBtn.className = 'fav-btn';
    favBtn.textContent = isFav ? '★' : '☆';
    favBtn.title = isFav ? 'Remove from favorites' : 'Save to favorites';
    favBtn.style.color = isFav ? '#dca95e' : '#999';
    favBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await toggleFavorite(ev, eventId, favBtn);
    });

    card.appendChild(link);
    card.appendChild(favBtn);
    return card;
  }

  function formatPrice(price, source) {
    if (!price || price === 'Price not listed') {
      const label = source ? `See on ${escapeHtml(source)}` : 'See price';
      return `<span class="price-cta">${label} →</span>`;
    }
    return escapeHtml(price);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

async function loadCityShows(city) {
  status.className = "status";
  status.textContent = `Fetching shows in ${city}…`;
  results.innerHTML = "";

  try {
    const res = await fetch(`${AUTH_API}/searcheventsbycity?city=${encodeURIComponent(city)}`);
    const data = await res.json();

    status.textContent = "";

    const cityHeading = document.createElement('p');
    cityHeading.className = 'result-count';
    cityHeading.textContent = `Upcoming shows in ${city}`;
    results.appendChild(cityHeading);

    if (data.events && data.events.length > 0) {
      const realOnly = data.events.filter(ev => !looksLikeTribute(ev.name));
      realOnly.forEach(ev => results.appendChild(buildEventCard(ev)));
    } else {
      const noneMsg = document.createElement('p');
      noneMsg.className = 'status';
      noneMsg.textContent = `No upcoming shows found in ${city} right now.`;
      results.appendChild(noneMsg);
    }

    // Append general trending below the city-specific results
    const picks = shuffle([...POPULAR_SEARCHES]).slice(0, 4);
    const settled = await Promise.allSettled(picks.map(term => fetchEvents(term)));

    let combined = [];
    settled.forEach(result => {
      if (result.status === 'fulfilled' && result.value.events) {
        const realOnly = result.value.events.filter(ev => !looksLikeTribute(ev.name));
        combined = combined.concat(realOnly.slice(0, 2));
      }
    });

    if (combined.length > 0) {
      combined = shuffle(combined);
      const trendingHeading = document.createElement('p');
      trendingHeading.className = 'result-count';
      trendingHeading.style.marginTop = '20px';
      trendingHeading.textContent = 'Trending right now';
      results.appendChild(trendingHeading);
      combined.forEach(ev => results.appendChild(buildEventCard(ev)));
    }

  } catch (err) {
    status.className = "status error";
    status.textContent = "Couldn't load shows for your city right now. Try a search above.";
    console.error(err);
  }
}

  function looksLikeTribute(name) {
    if (!name) return false;
    const flags = [
      'tribute', 'a salute to', 'the music of', 'cover band',
      'ultimate ', ' experience', 'reimagined',
      'party:', 'themed night', 'dance party', 'silent disco',
      'sing-along', 'trivia night', 'drag brunch'
    ];
    const lower = name.toLowerCase();
    return flags.some(flag => lower.includes(flag));
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function loadTrending() {

  let combined = [];
  settled.forEach(result => {
    if (result.status === 'fulfilled' && result.value.events) {
      const realOnly = result.value.events.filter(ev => !looksLikeTribute(ev.name));
      combined = combined.concat(realOnly.slice(0, 2));
    }
  });

  if (combined.length === 0) {
    status.textContent = "Couldn't load trending shows right now. Try a search above.";
    return;
  }

  combined = shuffle(combined);

  status.textContent = "";
  const heading = document.createElement('p');
  heading.className = 'result-count';
  heading.textContent = 'Trending right now';
  results.appendChild(heading);

  combined.forEach(ev => results.appendChild(buildEventCard(ev)));
}

async function fetchNextResultsPage() {
  if (!currentSearchTerm || isFetchingMorePage) return;
  const nextPage = resultsCurrentPage + 1;
  if (nextPage >= resultsTotalPages) return;

  isFetchingMorePage = true;
  const btn = document.getElementById('loadMoreBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Loading more…';
  }

  try {
    const data = await fetchEvents(currentSearchTerm, dateFromInput.value || null, dateToInput.value || null, currentCategory, nextPage);

    if (data.events) {
      // Guard against duplicates in case a page overlaps with what we already have.
      const seenKeys = new Set(currentResults.map(ev => `${ev.name}|${ev.date}|${ev.venue}`));
      const newEvents = data.events.filter(ev => !seenKeys.has(`${ev.name}|${ev.date}|${ev.venue}`));
      currentResults = currentResults.concat(newEvents);
      resultsCurrentPage = data.page;
      resultsTotalPages = data.totalPages;
    }
  } catch (err) {
    console.error('Failed to fetch additional results page', err);
  } finally {
    isFetchingMorePage = false;
    resultsDisplayCount += 25;
    renderResultsList();
  }
}

function renderResultsList() {
  const listEl = document.getElementById('resultsList');
  if (!listEl) return;

  // Category filtering now happens server-side (Ticketmaster's own
  // classificationName filter), so currentResults should already match
  // currentCategory. Only the tribute/cover-act toggle still needs to be
  // applied client-side, since Ticketmaster has no equivalent filter for it.
  let visible = currentResults;

  // Either tribute/cover acts are shown in normal chronological order along
  // with everything else, or they're hidden entirely — no more sorting them
  // to the bottom, since that's a middle ground nobody asked for.
  if (hideTributeCheckbox.checked) {
    visible = visible.filter(ev => !looksLikeTribute(ev.name));
  }

  listEl.innerHTML = '';
  const toShow = visible.slice(0, resultsDisplayCount);
  toShow.forEach(ev => listEl.appendChild(buildRowCard(ev)));

  const existingBtn = document.getElementById('loadMoreBtn');
  if (existingBtn) existingBtn.remove();

  const hasMorePages = (resultsCurrentPage + 1) < resultsTotalPages;

  if (visible.length === 0) {
    const emptyMsg = document.createElement('p');
    emptyMsg.className = 'status';
    emptyMsg.style.textAlign = 'center';
    emptyMsg.textContent = hasMorePages
      ? `No ${currentCategory.toLowerCase()} events in what we've fetched so far — checking for more…`
      : `No ${currentCategory.toLowerCase()} events found in this range.`;
    listEl.appendChild(emptyMsg);

    if (hasMorePages) {
      fetchNextResultsPage();
    }
    return;
  }

  if (resultsDisplayCount < visible.length) {
    // We already have enough matching results fetched to fill the next page.
    const loadMoreBtn = document.createElement('button');
    loadMoreBtn.id = 'loadMoreBtn';
    loadMoreBtn.textContent = `Load more (${visible.length - resultsDisplayCount} remaining)`;
    loadMoreBtn.addEventListener('click', () => {
      resultsDisplayCount += 25;
      renderResultsList();
    });
    results.appendChild(loadMoreBtn);
  } else if (hasMorePages) {
    // We've shown everything we have that matches the filter, but Ticketmaster
    // has more pages of results that haven't been checked yet.
    const loadMoreBtn = document.createElement('button');
    loadMoreBtn.id = 'loadMoreBtn';
    loadMoreBtn.textContent = 'Load more';
    loadMoreBtn.addEventListener('click', fetchNextResultsPage);
    results.appendChild(loadMoreBtn);
  }
}
  // Simple stable ID generator for local "is this favorited" checks.
  // Doesn't need to match the backend's uuid5 hash — just needs to be
  // consistent locally so we can toggle star state without an extra fetch.
  function getFavoriteId(url) {
    let hash = 0;
    for (let i = 0; i < url.length; i++) {
      hash = (hash << 5) - hash + url.charCodeAt(i);
      hash |= 0;
    }
    return 'id' + hash;
  }

  async function toggleFavorite(ev, eventId, btnEl) {
    const token = getSessionToken();
    if (!token) {
      openLoginModal();
      return;
    }

    const wasFav = localFavoriteIds.has(eventId);

    try {
      if (wasFav) {
        await fetch(`${AUTH_API}/removefavorite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
          body: JSON.stringify({ id: eventId })
        });
        localFavoriteIds.delete(eventId);
        btnEl.textContent = '☆';
        btnEl.style.color = '#999';
      } else {
        await fetch(`${AUTH_API}/addfavorite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
          body: JSON.stringify(ev)
        });
        localFavoriteIds.add(eventId);
        btnEl.textContent = '★';
        btnEl.style.color = '#dca95e';
      }
      localStorage.setItem('favIds', JSON.stringify([...localFavoriteIds]));
    } catch (err) {
      console.error('Failed to update favorite', err);
    }
  }

  let followedArtistNames = new Set();

  // Maps lowercased artist/team name -> verified Ticketmaster attraction ID,
  // populated as suggestion results come back. Used at follow-time so we can
  // pin the follow to the real artist's attraction instead of a loose
  // keyword text match (which is what pulls in tribute acts/cover bands).
  let knownAttractionIds = new Map();

  function rememberAttractionIds(attractions) {
    (attractions || []).forEach(a => {
      if (a && a.name && a.id) knownAttractionIds.set(a.name.toLowerCase(), a.id);
    });
  }

async function loadFollowedArtists() {

}

function updateFollowButtonState(btnEl, artistName) {

async function toggleFollowArtist(artistName, btnEl) {
  if (!artistName) return;
  const token = getSessionToken();
  if (!token) {
    openLoginModal();
    return;
  }

  const isFollowing = followedArtistNames.has(artistName.toLowerCase());

  try {
    if (isFollowing) {
      await fetch(`${AUTH_API}/unfollowartist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify({ artist: artistName })
      });
      followedArtistNames.delete(artistName.toLowerCase());
    } else {
      const attractionId = knownAttractionIds.get(artistName.toLowerCase());
      await fetch(`${AUTH_API}/followartist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify(attractionId ? { artist: artistName, attractionId } : { artist: artistName })
      });
      followedArtistNames.add(artistName.toLowerCase());
    }
    updateFollowButtonState(btnEl, artistName);
  } catch (err) {
    console.error('Failed to update follow status', err);
  }
}

  function updateAuthUI() {
    const email = getUserEmail();
    const loggedOut = document.getElementById('authLoggedOut');
    const loggedIn = document.getElementById('authLoggedIn');
    if (email) {
      loggedOut.style.display = 'none';
      loggedIn.style.display = 'inline';
      document.getElementById('userEmail').textContent = email;
    } else {
      loggedOut.style.display = 'inline';
      loggedIn.style.display = 'none';
    }
  }

  function openLoginModal() {
    document.getElementById('loginModal').style.display = 'flex';
  }

  function closeLoginModal() {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('loginStatus').textContent = '';
    document.getElementById('loginEmail').value = '';
  }

  const citySelect = document.getElementById('citySelect');
let currentUserCity = null;

async function loadUserProfile() {
  const token = getSessionToken();
  if (!token) return;

  try {
    const res = await fetch(`${AUTH_API}/getprofile`, {
      headers: { 'X-Session-Token': token }
    });
    const data = await res.json();
    if (res.ok && data.homeCity) {
      currentUserCity = data.homeCity;
    }
    if (res.ok && data.defaultCategory) {
      userDefaultCategory = data.defaultCategory;
      currentCategory = data.defaultCategory;
      renderCategoryChips();
    }
    if (res.ok && data.hideTributeDefault) {
      hideTributeCheckbox.checked = true;
    }
  } catch (err) {
    console.error('Failed to load profile', err);
  }
};

  let authMode = 'login'; // or 'signup'

document.getElementById('loginBtn').addEventListener('click', openLoginModal);
document.getElementById('closeLoginBtn').addEventListener('click', closeLoginModal);

document.getElementById('authToggleLink').addEventListener('click', (e) => {
  e.preventDefault();
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('authModalTitle').textContent = authMode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('sendLoginBtn').textContent = authMode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('authToggleText').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('authToggleLink').textContent = authMode === 'login' ? 'Sign up' : 'Log in';
  document.getElementById('loginStatus').textContent = '';
});

document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const statusEl = document.getElementById('loginStatus');

  if (!email || !email.includes('@')) {
    statusEl.textContent = 'Enter your email above first, then click "Forgot password?"';
    return;
  }

  statusEl.textContent = 'Sending reset link...';

  try {
    const res = await fetch(`${AUTH_API}/forgotpassword`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    statusEl.textContent = data.message || 'If an account exists for that email, a reset link has been sent.';
  } catch (err) {
    statusEl.textContent = 'Something went wrong. Please try again.';
  }
});

document.getElementById('sendLoginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const statusEl = document.getElementById('loginStatus');

  if (!email || !email.includes('@')) {
    statusEl.textContent = 'Please enter a valid email address.';
    return;
  }
  if (!password) {
    statusEl.textContent = 'Please enter a password.';
    return;
  }

  statusEl.textContent = authMode === 'login' ? 'Logging in...' : 'Creating account...';

  const endpoint = authMode === 'login' ? 'login' : 'signup';

  try {
    const res = await fetch(`${AUTH_API}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong.');

    if (authMode === 'login') {
      localStorage.setItem('sessionToken', data.sessionToken);
      localStorage.setItem('userEmail', data.email);
      closeLoginModal();
      updateAuthUI();
      await loadUserProfile();
      await loadFollowedArtists();
      loadDefaultSearch();
    } else {
      statusEl.textContent = data.message; // "Check your email to confirm..."
    }
  } catch (err) {
    statusEl.textContent = err.message;
  }
});

  document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('sessionToken');
  localStorage.removeItem('userEmail');
  currentUserCity = null;
  updateAuthUI();
  loadDefaultSearch();
});

async function init() {
  updateAuthUI();
  await loadUserProfile();
  await loadFollowedArtists();
  loadDefaultSearch();
}

init();
</script>
